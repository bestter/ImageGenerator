# separate terms of service, privacy policy, and support
# documentation.

# This workflow integrates SecurityCodeScan with GitHub's Code Scanning feature
# SecurityCodeScan is a vulnerability patterns detector for C# and VB.NET

name: SecurityCodeScan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '23 17 * * 0'

jobs:
  SCS:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2.0.0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.0.2

      - name: Set up projects for analysis
        uses: security-code-scan/security-code-scan-add-action@f8ff4f2763ed6f229eded80b1f9af82ae7f32a0d

      - name: Restore dependencies
        run: dotnet restore -p:EnableWindowsTargeting=true

      - name: Build
        run: dotnet build --no-restore -p:EnableWindowsTargeting=true --configuration Release

      - name: Run SecurityCodeScan analysis
        run: dotnet build --no-restore -p:EnableWindowsTargeting=true --configuration Release /p:TreatWarningsAsErrors=false /p:SecurityCodeScanGenerateSarif=true /p:SecurityCodeScanSarifOutputPath=../results

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
